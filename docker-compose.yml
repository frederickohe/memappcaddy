# Central reverse proxy for the Ymca Member App stack.
# Expected layout on the VPS (sibling repos):
#   systems/memapp-backend
#   systems/memappcaddy
#   systems/memapp-web
#
# Create the shared network once: ./setup-networks.sh  (or: docker network create memapp)
# Start order:
#   1. cd ../memapp-backend && docker compose up -d
#   2. cd ../memapp-web && npm ci && npm run build
#   3. cd ../memappcaddy && docker compose up -d
#
# DNS A records → VPS IP:
#   ymemberapp.com, www, api, admin, db, portainer

services:
  caddy:
    image: caddy:2
    container_name: memapp-caddy
    restart: unless-stopped
    environment:
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:-admin@ymemberapp.com}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../memapp-web/dist:/srv/www:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - memapp
    depends_on:
      - portainer

  portainer:
    image: portainer/portainer-ce:latest
    container_name: memapp_portainer
    restart: unless-stopped
    command: -H unix:///var/run/docker.sock --trusted-origins portainer.ymemberapp.com
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - memapp

volumes:
  caddy_data:
  caddy_config:
  portainer_data:

networks:
  memapp:
    external: true
    name: memapp
